<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramp Side Panel</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <div class="app-shell">
      <section id="sessionsView" class="panel-view">
        <header class="panel-header">
          <h1 class="panel-title">Ramp Inspect</h1>
          <div class="header-right">
            <button id="newSessionBtn" class="header-link" type="button">
              + New
            </button>
          </div>
        </header>

        <div class="filter-tabs" role="tablist" aria-label="Session filters">
          <button class="filter-tab is-active" type="button" data-filter="all">
            Active
          </button>
          <button class="filter-tab" type="button" data-filter="draft">
            <span id="countDraft" class="filter-count"></span> Draft
          </button>
          <button class="filter-tab" type="button" data-filter="active">
            <span id="countActive" class="filter-count"></span> Open
          </button>
          <button class="filter-tab" type="button" data-filter="done">
            Done
          </button>
        </div>

        <div id="sessionList" class="session-list" aria-live="polite"></div>

        <div class="composer-wrap">
          <div id="contextChip" class="context-chip is-hidden">
            <span class="chip-icon">↗</span>
            <span id="contextChipText" class="chip-text"></span>
            <button
              id="removeContextBtn"
              class="chip-remove"
              type="button"
              aria-label="Remove page context"
            >
              ×
            </button>
          </div>

          <div class="composer-shell">
            <textarea
              id="messageInput"
              rows="1"
              placeholder="Ask or build anything"
            ></textarea>

            <div class="composer-actions">
              <button
                id="attachBtn"
                class="icon-button"
                type="button"
                aria-label="Attach current page context"
                title="Refresh page context"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M21.44 11.05 12.25 20.24a6 6 0 1 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.19 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                </svg>
              </button>
              <button
                id="pinBtn"
                class="icon-button"
                type="button"
                aria-label="Pin page context"
                aria-pressed="false"
                title="Pin current page context"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 17v5"></path>
                  <path d="M9 3h6l-1 6 4 3v2H6v-2l4-3-1-6Z"></path>
                </svg>
              </button>
              <button
                id="sendBtn"
                class="send-button"
                type="button"
                aria-label="Send message"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m5 12 14-7-4 7 4 7-14-7Z"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <footer class="status-bar">
          <span class="status-model">claude opus 4.6</span>
          <span class="status-connection">
            <span id="connectionDot" class="connection-dot is-disconnected"></span>
            <span id="connectionLabel">offline</span>
          </span>
          <span class="status-mode">build agent</span>
        </footer>
      </section>

      <section id="chatView" class="panel-view" hidden>
        <header class="panel-header">
          <button
            id="backBtn"
            class="back-button"
            type="button"
            aria-label="Back to sessions"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m15 18-6-6 6-6"></path>
            </svg>
          </button>

          <div class="chat-heading">
            <h2 id="chatTitle" class="panel-title panel-title-chat">Session</h2>
            <p id="chatMeta" class="chat-meta">Ready to chat</p>
          </div>

          <select id="sessionStatus" class="status-select" aria-label="Session status">
            <option value="active">Active</option>
            <option value="draft">Draft</option>
            <option value="done">Done</option>
          </select>
        </header>

        <div id="chatMessages" class="chat-messages" aria-live="polite"></div>

        <div class="composer-wrap">
          <div id="chatContextChip" class="context-chip is-hidden">
            <span class="chip-icon">↗</span>
            <span id="chatContextChipText" class="chip-text"></span>
            <button
              id="chatRemoveContextBtn"
              class="chip-remove"
              type="button"
              aria-label="Remove page context"
            >
              ×
            </button>
          </div>

          <div class="composer-shell">
            <textarea
              id="chatInput"
              rows="1"
              placeholder="Ask or build anything"
            ></textarea>

            <div class="composer-actions">
              <button
                id="chatAttachBtn"
                class="icon-button"
                type="button"
                aria-label="Attach current page context"
                title="Refresh page context"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M21.44 11.05 12.25 20.24a6 6 0 1 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.19 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                </svg>
              </button>
              <button
                id="chatPinBtn"
                class="icon-button"
                type="button"
                aria-label="Pin page context"
                aria-pressed="false"
                title="Pin current page context"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 17v5"></path>
                  <path d="M9 3h6l-1 6 4 3v2H6v-2l4-3-1-6Z"></path>
                </svg>
              </button>
              <button
                id="chatSendBtn"
                class="send-button"
                type="button"
                aria-label="Send message"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m5 12 14-7-4 7 4 7-14-7Z"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <footer class="status-bar">
          <span class="status-model">claude opus 4.6</span>
          <span class="status-connection">
            <span id="chatConnectionDot" class="connection-dot is-disconnected"></span>
            <span id="chatConnectionLabel">offline</span>
          </span>
          <span class="status-mode">build agent</span>
        </footer>
      </section>
    </div>

    <script src="sidepanel.js"></script>
  </body>
</html>
